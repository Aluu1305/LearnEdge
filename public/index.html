<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnEdge — Learn Smarter with AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07070f;
      --bg2: #0e0e1f;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --purple: #7c3aed;
      --purple-light: #9d65ff;
      --blue: #3b82f6;
      --blue-light: #60a5fa;
      --grad: linear-gradient(135deg, #7c3aed, #3b82f6);
      --grad-text: linear-gradient(135deg, #a78bfa, #60a5fa);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --text-dim: #64748b;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ---- SCROLLBAR ---- */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

    /* ---- UTILITIES ---- */
    .grad-text {
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; border-radius: 50px;
      font-weight: 600; font-size: 15px; cursor: pointer;
      border: none; transition: all 0.25s; text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,58,237,0.55); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--card-border);
    }
    .btn-outline:hover { border-color: var(--purple-light); background: rgba(124,58,237,0.1); transform: translateY(-2px); }

    .section { padding: 96px 24px; max-width: 1200px; margin: 0 auto; }
    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
      color: var(--purple-light); font-size: 13px; font-weight: 600;
      padding: 6px 14px; border-radius: 50px; letter-spacing: 0.05em; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .section-title { font-size: clamp(28px, 4vw, 44px); font-weight: 800; line-height: 1.2; margin-bottom: 16px; }
    .section-sub { font-size: 17px; color: var(--text-muted); max-width: 600px; line-height: 1.7; }

    .glass-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    }
    .glass-card:hover {
      transform: translateY(-4px);
      border-color: rgba(124,58,237,0.3);
      box-shadow: 0 20px 48px rgba(0,0,0,0.4);
    }

    /* ---- NAVBAR ---- */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(7,7,15,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      transition: background 0.3s;
    }
    .nav-logo {
      font-size: 22px; font-weight: 800; background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      text-decoration: none; letter-spacing: -0.5px;
    }
    .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-login { color: var(--text-muted); font-size: 14px; font-weight: 500; cursor: pointer; background: none; border: none; transition: color 0.2s; }
    .nav-login:hover { color: var(--text); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: all 0.3s; }
    .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    .mobile-menu {
      display: none; position: fixed; top: 65px; left: 0; right: 0;
      background: rgba(7,7,15,0.97); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      padding: 24px 32px; flex-direction: column; gap: 20px; z-index: 999;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { color: var(--text-muted); text-decoration: none; font-size: 16px; font-weight: 500; transition: color 0.2s; padding: 4px 0; }
    .mobile-menu a:hover { color: var(--text); }
    .mobile-menu .btn { align-self: flex-start; }

    /* ---- HERO ---- */
    .hero-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      padding: 120px 24px 80px;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 30%, rgba(124,58,237,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 70%, rgba(59,130,246,0.15) 0%, transparent 70%);
    }
    .hero-grid-bg {
      position: absolute; inset: 0; z-index: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-inner {
      position: relative; z-index: 1;
      max-width: 1200px; width: 100%; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3);
      color: var(--purple-light); font-size: 13px; font-weight: 600;
      padding: 6px 14px; border-radius: 50px; margin-bottom: 24px;
    }
    .hero-badge .dot { width: 7px; height: 7px; background: #22d3ee; border-radius: 50%; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }
    .hero-title { font-size: clamp(38px, 5.5vw, 68px); font-weight: 900; line-height: 1.08; letter-spacing: -2px; margin-bottom: 20px; }
    .hero-sub { font-size: 18px; color: var(--text-muted); line-height: 1.7; margin-bottom: 36px; max-width: 480px; }
    .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 48px; }
    .hero-trust { display: flex; align-items: center; gap: 12px; }
    .avatar-stack { display: flex; }
    .avatar-stack .av {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--bg);
      background: var(--grad); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; margin-left: -8px;
    }
    .avatar-stack .av:first-child { margin-left: 0; }
    .hero-trust-text { font-size: 13px; color: var(--text-muted); }
    .hero-trust-text strong { color: var(--text); }

    /* Hero visual */
    .hero-visual { position: relative; display: flex; align-items: center; justify-content: center; }
    .hero-main-card {
      background: rgba(14,14,31,0.9); border: 1px solid var(--card-border);
      border-radius: 20px; padding: 28px; width: 100%; max-width: 380px;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: float-card 4s ease-in-out infinite;
    }
    @keyframes float-card { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    .hero-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .hero-card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .hero-card-title { font-weight: 700; font-size: 15px; }
    .hero-card-sub { font-size: 12px; color: var(--text-muted); }
    .hero-progress-list { display: flex; flex-direction: column; gap: 14px; }
    .hero-prog-item { display: flex; flex-direction: column; gap: 6px; }
    .hero-prog-label { display: flex; justify-content: space-between; font-size: 13px; }
    .hero-prog-label span:last-child { color: var(--purple-light); font-weight: 600; }
    .hero-prog-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .hero-prog-fill { height: 100%; border-radius: 3px; background: var(--grad); }
    .floating-badge {
      position: absolute; background: rgba(14,14,31,0.95); border: 1px solid var(--card-border);
      border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; backdrop-filter: blur(12px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .floating-badge .icon { font-size: 18px; }
    .badge-top { top: 10%; right: -10%; animation: float-card 3.5s ease-in-out infinite 0.5s; }
    .badge-bottom { bottom: 10%; left: -10%; animation: float-card 4.5s ease-in-out infinite 1s; }
    .badge-star { color: #fbbf24; }

    /* ---- STATS ---- */
    .stats-bar {
      padding: 0 24px 0;
      max-width: 1200px; margin: 0 auto;
    }
    .stats-inner {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 40px 48px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    }
    .stat-item { text-align: center; }
    .stat-num { font-size: clamp(28px, 3vw, 40px); font-weight: 900; background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .stat-label { font-size: 14px; color: var(--text-muted); margin-top: 6px; font-weight: 500; }
    .stat-divider { width: 1px; background: var(--card-border); height: auto; }

    /* ---- FEATURES ---- */
    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 56px; }
    .feat-card { padding: 32px; }
    .feat-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      margin-bottom: 20px;
    }
    .feat-title { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
    .feat-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

    /* ---- HOW IT WORKS ---- */
    .hiw-bg { background: var(--bg2); }
    .hiw-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 56px; position: relative; }
    .hiw-connector {
      position: absolute; top: 40px; left: calc(33% + 16px); right: calc(33% + 16px);
      height: 2px; background: linear-gradient(90deg, var(--purple), var(--blue));
      opacity: 0.4;
    }
    .hiw-connector2 {
      position: absolute; top: 40px; left: calc(66% + 8px); right: calc(0% + 80px);
      height: 2px; background: linear-gradient(90deg, var(--purple), var(--blue));
      opacity: 0.4;
    }
    .hiw-card { padding: 36px 28px; text-align: center; position: relative; }
    .hiw-num {
      width: 52px; height: 52px; border-radius: 50%; background: var(--grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 800; color: #fff;
      margin: 0 auto 20px; box-shadow: 0 8px 24px rgba(124,58,237,0.4);
    }
    .hiw-icon { font-size: 32px; margin-bottom: 16px; }
    .hiw-title { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .hiw-desc { font-size: 14px; color: var(--text-muted); line-height: 1.7; }

    /* ---- COURSES ---- */
    .courses-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 40px; }
    .courses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .course-card { display: flex; flex-direction: column; overflow: hidden; }
    .course-thumb {
      height: 160px; display: flex; align-items: center; justify-content: center;
      font-size: 48px; position: relative;
    }
    .course-badge {
      position: absolute; top: 12px; left: 12px;
      background: rgba(124,58,237,0.85); color: #fff; font-size: 11px; font-weight: 700;
      padding: 4px 10px; border-radius: 50px; letter-spacing: 0.05em;
    }
    .course-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .course-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
    .course-instructor { font-size: 13px; color: var(--text-muted); }
    .course-meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--card-border); }
    .course-rating { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; }
    .course-rating .stars { color: #fbbf24; }
    .course-students { font-size: 12px; color: var(--text-dim); }
    .course-price { font-size: 16px; font-weight: 800; }
    .course-price.free { background: var(--grad-text); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .view-all-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--purple-light); font-size: 14px; font-weight: 600; cursor: pointer; background: none; border: none; transition: gap 0.2s; }
    .view-all-btn:hover { gap: 10px; }

    /* ---- AI TUTOR DEMO ---- */
    .ai-demo-bg { background: var(--bg2); }
    .ai-demo-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .ai-demo-info { }
    .ai-demo-points { display: flex; flex-direction: column; gap: 16px; margin-top: 28px; }
    .ai-point { display: flex; align-items: flex-start; gap: 14px; }
    .ai-point-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
    }
    .ai-point-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .ai-point-text strong { color: var(--text); display: block; margin-bottom: 2px; }

    .chat-window {
      background: rgba(14,14,31,0.9); border: 1px solid var(--card-border);
      border-radius: 20px; overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
    }
    .chat-header {
      background: var(--grad); padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .chat-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .chat-header-info { }
    .chat-header-name { font-weight: 700; font-size: 14px; color: #fff; }
    .chat-header-status { font-size: 12px; color: rgba(255,255,255,0.75); display: flex; align-items: center; gap: 4px; }
    .chat-header-status::before { content: ''; display: inline-block; width: 7px; height: 7px; background: #22c55e; border-radius: 50%; }
    .chat-messages { padding: 20px; height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 2px; }
    .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
    }
    .msg.ai .msg-avatar { background: var(--grad); color: #fff; }
    .msg.user .msg-avatar { background: rgba(124,58,237,0.3); color: var(--purple-light); }
    .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 13.5px; line-height: 1.55; }
    .msg.ai .msg-bubble { background: rgba(255,255,255,0.06); border: 1px solid var(--card-border); color: var(--text); border-top-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--grad); color: #fff; border-top-right-radius: 4px; }
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 10px 14px; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: typing 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,80%,100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1.1); opacity: 1; } }
    .chat-input-wrap { padding: 12px 16px; border-top: 1px solid var(--card-border); display: flex; gap: 10px; }
    .chat-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--card-border);
      border-radius: 50px; padding: 10px 18px; color: var(--text); font-size: 14px;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: rgba(124,58,237,0.5); }
    .chat-input::placeholder { color: var(--text-dim); }
    .chat-send {
      width: 40px; height: 40px; border-radius: 50%; background: var(--grad);
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; transition: transform 0.2s, box-shadow 0.2s; flex-shrink: 0;
    }
    .chat-send:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(124,58,237,0.5); }
    .chat-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ---- PRICING ---- */
    .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 56px; }
    .pricing-card { padding: 36px 32px; position: relative; }
    .pricing-card.featured {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(59,130,246,0.1));
      border-color: rgba(124,58,237,0.4);
    }
    .featured-badge {
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      background: var(--grad); color: #fff; font-size: 11px; font-weight: 700;
      padding: 4px 14px; border-radius: 50px; letter-spacing: 0.05em; white-space: nowrap;
    }
    .pricing-tier { font-size: 13px; font-weight: 700; color: var(--purple-light); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .pricing-price { margin-bottom: 8px; }
    .pricing-price .amount { font-size: 48px; font-weight: 900; line-height: 1; }
    .pricing-price .period { font-size: 14px; color: var(--text-muted); }
    .pricing-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
    .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
    .pricing-features li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text-muted); }
    .pricing-features li .check { color: #22c55e; font-size: 16px; flex-shrink: 0; }
    .pricing-features li .cross { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }
    .pricing-features li.active { color: var(--text); }
    .pricing-btn { width: 100%; padding: 14px; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: all 0.25s; }
    .pricing-btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--card-border); }
    .pricing-btn-outline:hover { border-color: var(--purple-light); background: rgba(124,58,237,0.1); }
    .pricing-btn-primary { background: var(--grad); color: #fff; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
    .pricing-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,0.55); }

    /* ---- TESTIMONIALS ---- */
    .testi-bg { background: var(--bg2); }
    .testi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 56px; }
    .testi-card { padding: 32px; }
    .testi-stars { color: #fbbf24; font-size: 16px; margin-bottom: 16px; letter-spacing: 2px; }
    .testi-quote { font-size: 15px; color: var(--text-muted); line-height: 1.75; margin-bottom: 24px; font-style: italic; }
    .testi-author { display: flex; align-items: center; gap: 14px; }
    .testi-av {
      width: 44px; height: 44px; border-radius: 50%; background: var(--grad);
      display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: #fff;
    }
    .testi-name { font-size: 15px; font-weight: 700; }
    .testi-role { font-size: 13px; color: var(--text-dim); }

    /* ---- FAQ ---- */
    .faq-list { max-width: 760px; margin: 56px auto 0; display: flex; flex-direction: column; gap: 12px; }

function AITutorDemo() {
  const [messages, setMessages] = useState(INITIAL_MESSAGES);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior:'smooth' });
  useEffect(scrollToBottom, [messages, typing]);

  const getResponse = (text) => {
    for (const r of AI_RESPONSES) {
      if (r.trigger.test(text)) return r.response;
    }
    return DEFAULT_AI;
  };

  const send = () => {
    const trimmed = input.trim();
    if (!trimmed || typing) return;
    setMessages(m => [...m, { type:'user', text:trimmed }]);
    setInput('');
    setTyping(true);
    setTimeout(() => {
      setMessages(m => [...m, { type:'ai', text:getResponse(trimmed) }]);
      setTyping(false);
    }, 1200 + Math.random() * 600);
  };

  return (
    <div className="ai-demo-bg">
      <section className="section fade-in" id="ai-tutor">

                { icon:'⚡', title:'Instant answers', text:'Get responses in under 2 seconds on any topic across all 500+ courses in our library.' },
                { icon:'🧠', title:'Context-aware', text:'Edge remembers your progress and tailors every explanation to your current level.' },
                { icon:'📝', title:'Study plans', text:'Ask Edge to generate a full curriculum for any topic and it will build a week-by-week roadmap.' },
              ].map(p=>(
                <div className="ai-point" key={p.title}>
                  <div className="ai-point-icon">{p.icon}</div>
                  <div className="ai-point-text"><strong>{p.title}</strong>{p.text}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="chat-window">
            <div className="chat-header">
              <div className="chat-avatar">🤖</div>
              <div className="chat-header-info">
                <div className="chat-header-name">Edge AI Tutor</div>
                <div className="chat-header-status">Online · Ready to help</div>
              </div>
            </div>
            <div className="chat-messages">
              {messages.map((m,i) => (
                <div className={`msg ${m.type}`} key={i}>
                  <div className="msg-avatar">{m.type==='ai'?'🤖':'You'[0]}</div>
                  <div className="msg-bubble">{m.text}</div>
                </div>
              ))}
              {typing && (
                <div className="msg ai">
                  <div className="msg-avatar">🤖</div>
                  <div className="msg-bubble">
                    <div className="typing-indicator">
                      <div className="typing-dot"/><div className="typing-dot"/><div className="typing-dot"/>
                    </div>
                  </div>
                </div>
              )}
              <div ref={messagesEndRef}/>
            </div>
            <div className="chat-input-wrap">
              <input
                className="chat-input"
                placeholder="Ask anything... (try 'Python', 'career advice')"
                value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&send()}
              />
              <button className="chat-send" onClick={send} disabled={typing||!input.trim()}>➤</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  );
}

/* ── ROOT APP ── */
function App() {
  const [menuOpen, setMenuOpen] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(
      (entries) => entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);

  return (
    <>
      <Navbar menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
      <Hero />
      <StatsBar />
      <Features />
      <HowItWorks />
      <Courses />
      <AITutorDemo />
      <Pricing />
      <Testimonials />
      <FAQ />
      <CTABanner />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
